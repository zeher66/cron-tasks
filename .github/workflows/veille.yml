name: Cyber Veille

on:
  schedule:
    # Toutes les 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis GitHub

# Permissions minimales
permissions:
  contents: write

# Empecher les executions simultanees
concurrency:
  group: cyber-veille
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout du repo (avec la DB)
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Installer les dependances
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Lancer la veille
      - name: Run cyber veille
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      # 5. Commit la DB pour persistance
      - name: Save database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp veille.db veille.db.bak
          cp -f source_status.json source_status.json.bak 2>/dev/null || true
          cp -f export_*.csv /tmp/ 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          cp veille.db.bak veille.db
          cp -f source_status.json.bak source_status.json 2>/dev/null || true
          cp -f /tmp/export_*.csv . 2>/dev/null || true
          git add veille.db
          git add -f source_status.json 2>/dev/null || true
          git add -f export_*.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "update: veille.db $(TZ='Europe/Paris' date +'%Y-%m-%d %H:%M Paris')"
          git push

      # 6. Backup DB hebdomadaire (dimanche)
      - name: Weekly DB backup
        run: |
          DAY_OF_WEEK=$(date -u +%u)
          HOUR=$(TZ='Europe/Paris' date +%H)
          if [ "$DAY_OF_WEEK" = "7" ] && [ "$HOUR" = "10" ]; then
            echo "Backup hebdomadaire de la DB"
            git checkout -B backup
            git add -f veille.db
            git commit -m "backup: veille.db $(TZ='Europe/Paris' date +'%Y-%m-%d')" || true
            git push origin backup --force
            git checkout main
          else
            echo "Pas encore dimanche 10h, skip backup"
          fi
