name: Cyber Veille

on:
  schedule:
    # Toutes les 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis GitHub

# Permissions minimales
permissions:
  contents: write

# Empecher les executions simultanees
concurrency:
  group: cyber-veille
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout du repo (avec la DB)
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Installer les dependances
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Lancer la veille
      - name: Run cyber veille
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # 5. Commit la DB pour persistance
      - name: Save database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add veille.db
          git diff --staged --quiet || git commit -m "update: veille.db $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
