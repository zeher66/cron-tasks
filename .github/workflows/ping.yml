name: Ping Render

on:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/12$((RANDOM % 10)).0.0.0 Safari/537.36"
          curl -s -A "$UA" "https://cron-tasks.onrender.com/?t=$(date +%s)" > /dev/null
